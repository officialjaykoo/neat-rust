[neat]
fitness_criterion = "max"
fitness_threshold = 420.0
pop_size = 80
reset_on_extinction = true
no_fitness_termination = true

[genome]
num_inputs = 8
num_outputs = 4
num_hidden = 0
feed_forward = false
initial_connection = { mode = "full_direct" }
conn_add_prob = 0.10
conn_delete_prob = 0.02
node_add_prob = 0.025
node_delete_prob = 0.01
single_structural_mutation = false
structural_mutation_surer = "default"
compatibility_disjoint_coefficient = 1.0
compatibility_excess_coefficient = "auto"
compatibility_include_node_genes = true
compatibility_enable_penalty = 1.0
compatibility_weight_coefficient = 0.45

[genome.activation]
default = "tanh"
mutate_rate = 0.0
options = ["tanh", "identity", "relu"]

[genome.aggregation]
default = "sum"
mutate_rate = 0.0
options = ["sum"]

[genome.bias]
init_mean = 0.0
init_stdev = 0.35
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.25
mutate_rate = 0.55
replace_rate = 0.08

[genome.response]
init_mean = 1.0
init_stdev = 0.0
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.0
mutate_rate = 0.0
replace_rate = 0.0

[genome.memory_gate_enabled]
default = false
mutate_rate = 0.02
rate_to_true_add = 0.04
rate_to_false_add = 0.0

[genome.memory_gate_bias]
init_mean = 0.0
init_stdev = 0.15
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.15
mutate_rate = 0.25
replace_rate = 0.04

[genome.memory_gate_response]
init_mean = 1.0
init_stdev = 0.10
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.08
mutate_rate = 0.15
replace_rate = 0.03

[genome.enabled]
default = true
mutate_rate = 0.012
rate_to_true_add = 0.0
rate_to_false_add = 0.0

[genome.weight]
init_mean = 0.0
init_stdev = 0.45
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.22
mutate_rate = 0.62
replace_rate = 0.08

[species_set]
compatibility_threshold = 3.0
target_num_species = "none"
threshold_adjust_rate = 0.1
threshold_min = 0.1
threshold_max = 100.0

[stagnation]
species_fitness_func = "max"
max_stagnation = 14
species_elitism = 1

[reproduction]
elitism = 1
survival_threshold = 0.25
min_species_size = 2
fitness_sharing = "normalized"
spawn_method = "smoothed"
interspecies_crossover_prob = 0.0

[reproduction.adaptive_mutation]
enabled = true
start_after = 3
full_after = 12
max_multiplier = 3.0
conn_add_prob_cap = 0.28
conn_delete_prob_cap = 0.08
node_add_prob_cap = 0.10
node_delete_prob_cap = 0.04
