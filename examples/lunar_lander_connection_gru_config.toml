[neat]
fitness_criterion = "max"
fitness_threshold = 900.0
pop_size = 64
reset_on_extinction = true
no_fitness_termination = true

[genome]
num_inputs = 6
num_outputs = 2
num_hidden = 0
feed_forward = false
initial_connection = { mode = "full_direct" }
conn_add_prob = 0.10
conn_delete_prob = 0.02
node_add_prob = 0.03
node_delete_prob = 0.01
single_structural_mutation = false
structural_mutation_surer = "default"
compatibility_disjoint_coefficient = 1.0
compatibility_excess_coefficient = "auto"
compatibility_include_node_genes = true
compatibility_enable_penalty = 1.0
compatibility_weight_coefficient = 0.5

[genome.activation]
default = "tanh"
mutate_rate = 0.0
options = ["tanh", "identity"]

[genome.aggregation]
default = "sum"
mutate_rate = 0.0
options = ["sum"]

[genome.bias]
init_mean = 0.0
init_stdev = 0.4
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.30
mutate_rate = 0.60
replace_rate = 0.08

[genome.response]
init_mean = 1.0
init_stdev = 0.0
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.0
mutate_rate = 0.0
replace_rate = 0.0

[genome.memory_gate_enabled]
default = false
mutate_rate = 0.03
rate_to_true_add = 0.05
rate_to_false_add = 0.0

[genome.memory_gate_bias]
init_mean = 0.0
init_stdev = 0.15
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.20
mutate_rate = 0.30
replace_rate = 0.05

[genome.memory_gate_response]
init_mean = 1.0
init_stdev = 0.10
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.10
mutate_rate = 0.18
replace_rate = 0.03

[genome.enabled]
default = true
mutate_rate = 0.01
rate_to_true_add = 0.0
rate_to_false_add = 0.0

[genome.weight]
init_mean = 0.0
init_stdev = 0.5
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.25
mutate_rate = 0.65
replace_rate = 0.08

[genome.connection_gru_enabled]
default = true
mutate_rate = 0.025
rate_to_true_add = 0.025
rate_to_false_add = 0.01

[genome.connection_memory_weight]
init_mean = 0.0
init_stdev = 0.18
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.10
mutate_rate = 0.40
replace_rate = 0.05

[genome.connection_reset_input_weight]
init_mean = 0.0
init_stdev = 0.14
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.08
mutate_rate = 0.32
replace_rate = 0.04

[genome.connection_reset_memory_weight]
init_mean = 0.0
init_stdev = 0.14
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.08
mutate_rate = 0.32
replace_rate = 0.04

[genome.connection_update_input_weight]
init_mean = 0.0
init_stdev = 0.14
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.08
mutate_rate = 0.32
replace_rate = 0.04

[genome.connection_update_memory_weight]
init_mean = 0.0
init_stdev = 0.14
init_type = "gaussian"
max_value = 5.0
min_value = -5.0
mutate_power = 0.08
mutate_rate = 0.32
replace_rate = 0.04

[species_set]
compatibility_threshold = 3.0
target_num_species = "none"
threshold_adjust_rate = 0.1
threshold_min = 0.1
threshold_max = 100.0

[stagnation]
species_fitness_func = "max"
max_stagnation = 14
species_elitism = 1

[reproduction]
elitism = 1
survival_threshold = 0.25
min_species_size = 2
fitness_sharing = "normalized"
spawn_method = "smoothed"
interspecies_crossover_prob = 0.0

[reproduction.adaptive_mutation]
enabled = true
start_after = 3
full_after = 12
max_multiplier = 3.0
conn_add_prob_cap = 0.25
conn_delete_prob_cap = 0.08
node_add_prob_cap = 0.12
node_delete_prob_cap = 0.04
